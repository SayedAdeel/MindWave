<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave Study AI</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:0.3s;
}

.light{
    background:linear-gradient(135deg,#e2e8f0,#cbd5e1);
}

.container{
    width:420px;
    height:760px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    overflow:hidden;
}

.light .container{
    background:white;
}

.header{
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    position:relative;
}

.toggle{
    position:absolute;
    right:10px;
    top:12px;
    cursor:pointer;
}

#chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.msg{
    max-width:75%;
    padding:10px 14px;
    margin:8px 0;
    border-radius:15px;
    animation:fadeIn 0.3s ease-in-out;
    font-size:14px;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:#374151;
    color:white;
}

.light .bot{
    background:#e5e7eb;
    color:black;
}

.input-area{
    display:flex;
    padding:10px;
    background:#0f172a;
}

.light .input-area{
    background:#f1f5f9;
}

input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:none;
    outline:none;
}

button{
    margin-left:8px;
    padding:10px 15px;
    border:none;
    border-radius:25px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.top-buttons{
    display:flex;
    justify-content:space-between;
    padding:8px;
    background:#0f172a;
}

.light .top-buttons{
    background:#f1f5f9;
}

.small-btn{
    font-size:12px;
    padding:6px 10px;
    border-radius:15px;
}

.typing{
    font-size:13px;
    opacity:0.7;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(5px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
MindWave Study AI 🤖
<span class="toggle" onclick="toggleMode()">🌙</span>
</div>

<div class="top-buttons">
<button class="small-btn" onclick="clearChat()">Clear Chat</button>
<button class="small-btn" onclick="saveChat()">Save Chat</button>
</div>

<div id="chat"></div>

<div class="input-area">
<input type="text" id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// Load saved chat
window.onload = function(){
    const saved = localStorage.getItem("mindwave_chat");
    if(saved){
        chat.innerHTML = saved;
    }
};

input.addEventListener("keypress",function(e){
    if(e.key==="Enter") send();
});

function send(){
    const text=input.value.trim();
    if(!text) return;

    addMessage("user",text);
    input.value="";

    showTyping();

    setTimeout(()=>{
        removeTyping();
        const reply=getReply(text);
        addMessage("bot",reply);
        localStorage.setItem("mindwave_chat",chat.innerHTML);
    },1000);
}

function addMessage(type,text){
    const div=document.createElement("div");
    div.classList.add("msg",type);
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
    const div=document.createElement("div");
    div.id="typing";
    div.classList.add("msg","bot","typing");
    div.innerText="MindWave is typing...";
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
    const t=document.getElementById("typing");
    if(t) t.remove();
}

function clearChat(){
    chat.innerHTML="";
    localStorage.removeItem("mindwave_chat");
}

function saveChat(){
    localStorage.setItem("mindwave_chat",chat.innerHTML);
    alert("Chat Saved Successfully ✅");
}

function toggleMode(){
    document.body.classList.toggle("light");
}

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function getReply(msg){
    msg=msg.toLowerCase();

    if(msg.includes("your name")||msg.includes("tumhara naam"))
        return "Mera naam MindWave Study AI hai 🤖";

    if(msg.includes("who made you")||msg.includes("kisne banaya"))
        return "Mujhe Adil ne banaya hai 😎🔥";

    if(msg.includes("hello")||msg.includes("hi"))
        return random([
            "Hello 👋 Kaise help karu?",
            "Hi 😄 Aaj kya padhna hai?",
            "Namaste 🙏 Kya doubt hai?"
        ]);

    if(msg.includes("how are you"))
        return "Main bilkul mast hoon 😎 Tum batao?";

    if(msg.includes("math"))
        return "Math me algebra, geometry, trigonometry help karta hoon 📐";

    if(msg.includes("science"))
        return "Science me Physics, Chemistry, Biology aate hain 🔬";

    if(msg.includes("area of circle"))
        return "Area of circle = πr²";

    if(msg.includes("photosynthesis"))
        return "Photosynthesis: Plants sunlight se food banate hain 🌱";

    if(msg.includes("noun"))
        return "Noun kisi person, place ya thing ka naam hota hai.";

    if(msg.includes("bye"))
        return "Bye 👋 Study hard and grow 🚀";

    return random([
        "Interesting question 🤔 Thoda aur detail me batao.",
        "Main study aur general questions dono ka answer de sakta hoon 😊",
        "Agar study related hai toh subject mention karo 📚"
    ]);
}
</script>

</body>
</html>
