<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave AI</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f0f4f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.chat-container {
  width: 400px;
  background-color: #fff;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  padding: 15px;
  display: flex;
  flex-direction: column;
}
.chat-container h2 {
  text-align: center;
  margin-bottom: 10px;
  color: #4b4bff;
}
.chat-box {
  height: 400px;
  overflow-y: auto;
  border: 1px solid #ddd;
  border-radius: 5px;
  padding: 10px;
  margin-bottom: 10px;
  background-color: #f9f9f9;
}
.chat-message {
  margin: 5px 0;
}
.user-msg { text-align: right; color: #1a73e8; }
.bot-msg { text-align: left; color: #34a853; }
#user-input { padding: 10px; border-radius: 5px; border: 1px solid #ddd; flex: 1; }
#send-btn { padding: 10px; margin-top: 5px; border: none; background-color: #4b4bff; color: white; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>

<div class="chat-container">
  <h2>MindWave 🤖</h2>
  <div class="chat-box" id="chat-box"></div>
  <input type="text" id="user-input" placeholder="Type your message..." />
  <button id="send-btn">Send</button>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;
  addMessage('user', message);
  userInput.value = '';

  // Simulated AI response
  setTimeout(() => {
    const reply = generateReply(message);
    addMessage('bot', reply);
  }, 300);
}

function addMessage(sender, message) {
  const msgDiv = document.createElement('div');
  msgDiv.classList.add('chat-message', sender === 'user' ? 'user-msg' : 'bot-msg');
  msgDiv.textContent = message;
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Simple language-based reply generator
function generateReply(message) {
  const msg = message.toLowerCase();
  
  // Hindi detection (simple keywords)
  const hindiKeywords = ['kya', 'kaise', 'ka', 'hai', 'aap', 'mera', 'mera kya', 'ka haal'];
  const isHindi = hindiKeywords.some(word => msg.includes(word));
  
  if (isHindi) {
    if (msg.includes('kya haal')) return "Main thik hoon, aapka kya haal hai?";
    if (msg.includes('kaise ho')) return "Main bilkul thik hoon, aap kaise ho?";
    return "Main theek hoon, aap batao!";
  } else { // English reply
    if (msg.includes('how are you')) return "I'm fine, how are you?";
    if (msg.includes('hello') || msg.includes('hi')) return "Hello! How can I help you?";
    return "I am fine, tell me about you!";
  }
}
</script>

</body>
</html>
