<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave Study AI</title>

<style>
body {
    margin:0;
    font-family:Arial;
    transition:0.3s;
}
.dark { background:#0f172a; color:white; }
.light { background:#f1f5f9; color:black; }

.wrapper {
    width:420px;
    margin:20px auto;
}

.ad-space {
    height:80px;
    background:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
    font-weight:bold;
}

.chat-container {
    height:600px;
    display:flex;
    flex-direction:column;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.header {
    padding:15px;
    text-align:center;
    background:#2563eb;
    color:white;
    position:relative;
}

.toggle-btn {
    position:absolute;
    right:10px;
    top:10px;
    border:none;
    padding:5px;
    border-radius:5px;
    cursor:pointer;
}

#chat-box {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.message {
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:75%;
}

.user {
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.ai {
    background:#e2e8f0;
    color:black;
}

.input-area {
    display:flex;
    padding:10px;
}

input {
    flex:1;
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    margin-left:5px;
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body class="dark">

<div class="wrapper">

<div class="ad-space">
Google Ads Space (Approval ke baad ads dikhenge)
</div>

<div class="chat-container">

<div class="header">
MindWave Study AI 🤖
<button class="toggle-btn" onclick="toggleMode()">🌙</button>
</div>

<div id="chat-box"></div>

<div class="input-area">
<input type="text" id="user-input" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
