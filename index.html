<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave Study AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.wrapper{
    width:420px;
    margin:20px auto;
}

.chat-container{
    height:650px;
    display:flex;
    flex-direction:column;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    background:#1e293b;
}

.header{
    background:#2563eb;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#chat-box{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.message{
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    max-width:75%;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#334155;
}

.input-area{
    display:flex;
    padding:10px;
    background:#0f172a;
}

input{
    flex:1;
    padding:8px;
    border-radius:5px;
    border:none;
}

button{
    margin-left:5px;
    padding:8px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="chat-container">

<div class="header">
MindWave Study AI 🤖
</div>

<div id="chat-box"></div>

<div class="input-area">
<input type="text" id="user-input" placeholder="Ask your study question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
