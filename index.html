<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave AI</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:10px;
    max-width:80%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    align-self:flex-end;
}

.bot{
    background:#334155;
    align-self:flex-start;
}

#inputArea{
    display:flex;
    padding:10px;
    background:#1e293b;
}

#input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
    outline:none;
}

#send{
    padding:10px 15px;
    margin-left:10px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>MindWave AI</header>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="input" placeholder="Ask me anything...">
    <button id="send">Send</button>
</div>

<!-- Ye line bahut important hai -->
<script src="script.js"></script>

</body>
</html>
