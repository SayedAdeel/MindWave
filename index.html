<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave AI</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#2563eb;
    align-self:flex-end;
}

.bot{
    background:#334155;
    align-self:flex-start;
}

#inputArea{
    display:flex;
    padding:10px;
    background:#1e293b;
}

#input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
    outline:none;
}

#send{
    padding:10px 15px;
    margin-left:10px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>MindWave AI 🤖</header>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="input" placeholder="Ask me anything...">
    <button id="send">Send</button>
</div>

<script>

const API_KEY = "AIzaSyAPocUTPwrTxI1r6ynY96-KpGJhhFwc-Xo;  // 👈 YAHAN API KEY DALNI HAI

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

send.onclick = sendMessage;
input.addEventListener("keypress", e=>{
    if(e.key==="Enter") sendMessage();
});

function addMessage(text,type){
    const msg = document.createElement("div");
    msg.classList.add("message",type);
    msg.textContent=text;
    chat.appendChild(msg);
    chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";
    addMessage("Thinking...","bot");

    try{
        const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:[{
                    parts:[{ text:text }]
                }]
            })
        });

        const data = await response.json();
        chat.removeChild(chat.lastChild);

        if(data.candidates){
            const reply = data.candidates[0].content.parts[0].text;
            addMessage(reply,"bot");
        }else{
            addMessage("Error getting response 😢","bot");
        }

    }catch(error){
        chat.removeChild(chat.lastChild);
        addMessage("API Error 😢 Check your key.","bot");
    }
}

</script>

</body>
</html>
