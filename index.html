<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave AI – Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe);
    transition:0.3s;
}

.chat-container{
    width:520px;
    height:650px;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    padding:15px;
    transition:0.3s;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.header h2{
    font-size:20px;
    color:#333;
}

#toggle{
    padding:6px 12px;
    border:none;
    border-radius:20px;
    background:#111;
    color:white;
    cursor:pointer;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    max-width:75%;
    padding:10px 14px;
    border-radius:18px;
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
    color:black;
}

.user{
    align-self:flex-end;
    background:#e5e7eb;
    border-bottom-right-radius:5px;
}

.bot{
    align-self:flex-start;
    background:#f3f4f6;
    border-bottom-left-radius:5px;
}

.input-area{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
    color:black;
}

#send{
    padding:10px 16px;
    border:none;
    border-radius:20px;
    background:black;
    color:white;
    cursor:pointer;
}

/* Dark Mode */
.dark{
    background:linear-gradient(135deg,#111,#1f2937);
}

.dark .chat-container{
    background:#1e1e1e;
}

.dark .message{
    color:black;
}

.dark .user{
    background:#d1d5db;
}

.dark .bot{
    background:#e5e7eb;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">
<h2>MindWave</h2>
        
        <button id="toggle">Dark</button>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type a message...">
        <button id="send">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const toggle = document.getElementById("toggle");

let mood = "normal";
let userName = "";

toggle.onclick = () => {
    document.body.classList.toggle("dark");
};

send.onclick = sendMessage;
input.addEventListener("keypress", e=>{
    if(e.key==="Enter") sendMessage();
});

function sendMessage(){
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    setTimeout(()=>{
        const reply = generateReply(text);
        addMessage(reply,"bot");
    },400);
}

function addMessage(text,type){
    const msg = document.createElement("div");
    msg.classList.add("message",type);
    msg.textContent=text;
    chat.appendChild(msg);
    chat.scrollTop=chat.scrollHeight;
}

function generateReply(message){
    const msg = message.toLowerCase();

    if(msg.includes("your name") || msg.includes("apka naam")){
        return "My name is MindWave 🤖";
    }

    if(msg.includes("mera naam")){
        userName = message.split("mera naam")[1]?.trim();
        return "Nice to meet you 😄";
    }

    if(msg.includes("how are you")){
        return mood==="happy" ? 
        "I'm feeling amazing today! 😄 How about you?" :
        "I'm fine 🙂 What about you?";
    }

    if(msg.includes("kya haal") || msg.includes("kaise ho")){
        return "Main theek hoon 😎 Aap batao?";
    }

    if(msg.includes("joke")){
        return "Why don’t programmers like nature? It has too many bugs 😂";
    }

    if(msg.includes("happy")) mood="happy";

    const replies=[
        "That's interesting 😄",
        "Tell me more about that.",
        "Hmm 🤔 I see.",
        "Nice! 😊",
        "Sounds good!"
    ];

    return replies[Math.floor(Math.random()*replies.length)];
}
</script>

</body>
</html>
