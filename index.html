<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave AI (Local)</title>
<style>
body { font-family: Arial, sans-serif; background-color:#f0f4f8; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.chat-container { width:400px; background-color:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); padding:15px; display:flex; flex-direction:column; }
.chat-container h2 { text-align:center; margin-bottom:10px; color:#4b4bff; }
.chat-box { height:400px; overflow-y:auto; border:1px solid #ddd; border-radius:5px; padding:10px; margin-bottom:10px; background-color:#f9f9f9; }
.chat-message { margin:5px 0; }
.user-msg { text-align:right; color:#1a73e8; }
.bot-msg { text-align:left; color:#34a853; }
#user-input { padding:10px; border-radius:5px; border:1px solid #ddd; flex:1; }
#send-btn { padding:10px; margin-top:5px; border:none; background-color:#4b4bff; color:white; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>

<div class="chat-container">
  <h2>MindWave 🤖 (Local)</h2>
  <div class="chat-box" id="chat-box"></div>
  <input type="text" id="user-input" placeholder="Type your message..." />
  <button id="send-btn">Send</button>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keypress', e => { if(e.key==='Enter') handleSend(); });

function handleSend(){
  const message = userInput.value.trim();
  if(!message) return;
  addMessage('user', message);
  userInput.value = '';
  setTimeout(()=>{ addMessage('bot', generateReply(message)); }, 200);
}

function addMessage(sender, message){
  const msgDiv = document.createElement('div');
  msgDiv.classList.add('chat-message', sender==='user'?'user-msg':'bot-msg');
  msgDiv.textContent = message;
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Smarter fake AI reply generator
function generateReply(message){
  const msg = message.toLowerCase();
  const hindiWords = ['kya','kaise','ka','hai','aap','mera','ka haal','namaste'];
  const isHindi = hindiWords.some(word => msg.includes(word));

  if(isHindi){
    const replies = [
      "Main thik hoon, aapka kya haal hai?",
      "Bilkul theek hoon, aap kaise ho?",
      "Main theek hoon, aap batao!",
      "Shukriya! Aap kaise ho?",
      "Main badhiya hoon, aap kaise ho?"
    ];
    return replies[Math.floor(Math.random() * replies.length)];
  } else {
    const replies = [
      "I'm fine, how are you?",
      "Doing great! How about you?",
      "I'm good, what about you?",
      "All good here! How's your day?",
      "I'm doing well, and you?"
    ];
    return replies[Math.floor(Math.random() * replies.length)];
  }
}
</script>

</body>
</html>
