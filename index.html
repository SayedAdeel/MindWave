<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave Study AI</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:420px;
    height:750px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    overflow:hidden;
}

.header{
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
}

#chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.msg{
    max-width:75%;
    padding:10px 14px;
    margin:8px 0;
    border-radius:15px;
    animation:fadeIn 0.3s ease-in-out;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#374151;
}

.input-area{
    display:flex;
    padding:12px;
    background:#0f172a;
}

input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:none;
    outline:none;
    font-size:14px;
}

button{
    margin-left:8px;
    padding:10px 16px;
    border:none;
    border-radius:25px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

.typing{
    font-size:13px;
    opacity:0.7;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(5px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
MindWave Study AI 🤖
</div>

<div id="chat"></div>

<div class="input-area">
<input type="text" id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keypress",function(e){
    if(e.key==="Enter") send();
});

function send(){
    const text = input.value.trim();
    if(!text) return;

    addMessage("user",text);
    input.value="";

    showTyping();

    setTimeout(()=>{
        removeTyping();
        const reply = getReply(text);
        addMessage("bot",reply);
    },1000);
}

function addMessage(type,text){
    const div=document.createElement("div");
    div.classList.add("msg",type);
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
    const div=document.createElement("div");
    div.id="typing";
    div.classList.add("msg","bot","typing");
    div.innerText="MindWave is typing...";
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
    const t=document.getElementById("typing");
    if(t) t.remove();
}

function getReply(msg){
    msg=msg.toLowerCase();

    if(msg.includes("your name") || msg.includes("tumhara naam"))
        return "Mera naam MindWave Study AI hai 🤖";

    if(msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adil ne banaya hai 😎🔥";

    if(msg.includes("hello")||msg.includes("hi"))
        return "Hello 👋 Kaise help karu aaj?";

    if(msg.includes("how are you"))
        return "Main bilkul mast hoon 😄 Tum batao?";

    if(msg.includes("math"))
        return "Math me algebra, geometry, trigonometry help karta hoon 📐";

    if(msg.includes("area of circle"))
        return "Area of circle = πr²";

    if(msg.includes("science"))
        return "Science me Physics, Chemistry, Biology aate hain 🔬";

    if(msg.includes("photosynthesis"))
        return "Photosynthesis: Plants sunlight se food banate hain 🌱";

    if(msg.includes("bye"))
        return "Bye 👋 Study hard and grow 🚀";

    return "Main study aur general questions dono ka jawab de sakta hoon 😊";
}
</script>

</body>
</html>
